<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Echoes of the Terminal{% endblock %}</title>
<link rel="stylesheet" href="/static/style.css">
<script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
</head>
<body>
<header class="site-header">
  <span class="header-logo">[ ECHOES OF THE TERMINAL ]</span>
  <nav class="header-nav">
    <a href="/" {% if active_page == 'lobby' %}class="active"{% endif %}>LOBBY</a>
    <a href="/records" {% if active_page == 'records' %}class="active"{% endif %}>RECORDS</a>
  </nav>
  <span class="header-ver">v{{ version }}</span>
</header>

<main>
{% block content %}{% endblock %}
</main>

<footer class="site-footer">
  <span class="dim">// analyze [keyword] to breach the core</span>
</footer>
</body>
</html>
