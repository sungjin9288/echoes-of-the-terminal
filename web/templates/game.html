{% extends "base.html" %}
{% block title %}게임 — Echoes of the Terminal{% endblock %}

{% block content %}
<div class="game-wrap" id="game-root" data-sid="{{ session_id }}">

  <!-- 터미널 출력 영역 -->
  <div class="term-screen" id="term-screen">
    <div id="term-output">
      <pre class="term-out dim">[ ESTABLISHING CONNECTION... ]</pre>
    </div>

    <!-- 커맨드 입력 -->
    <div class="cmd-row" id="cmd-row">
      <span class="prompt-str">&gt;&nbsp;</span>
      <form id="cmd-form">
        <input
          id="cmd-input"
          type="text"
          autocomplete="off"
          autocorrect="off"
          spellcheck="false"
          placeholder="analyze [keyword] | cat log | ls | help"
          autofocus
        >
        <button type="submit" class="btn-send">SEND</button>
      </form>
    </div>
  </div>

  <!-- 상태 표시 -->
  <div class="game-status-bar">
    <span id="status-txt" class="dim">CONNECTING</span>
    <span class="sep">|</span>
    <a href="/" class="dim quit-link" onclick="return quitGame()">[ QUIT ]</a>
  </div>

</div>

<script>
const SID = document.getElementById('game-root').dataset.sid;
const termOutput = document.getElementById('term-output');
const cmdInput = document.getElementById('cmd-input');
const statusTxt = document.getElementById('status-txt');
let lastStatus = 'playing';
let evtSource = null;

/* ── SSE 스트림 ──────────────────────────────────────────────────────── */
function connectStream() {
  evtSource = new EventSource(`/api/game/${SID}/stream`);

  evtSource.onmessage = function(e) {
    const data = JSON.parse(e.data);
    if (data.html) appendOutput(data.html);
    if (data.status && data.status !== lastStatus) {
      lastStatus = data.status;
      updateStatus(data.status);
    }
    if (data.done) {
      evtSource.close();
      evtSource = null;
    }
  };

  evtSource.onerror = function() {
    evtSource.close();
    evtSource = null;
    // 게임이 아직 진행 중이면 2초 후 재연결
    if (lastStatus === 'playing') {
      setTimeout(connectStream, 2000);
    }
  };
}

/* ── 출력 추가 ───────────────────────────────────────────────────────── */
function appendOutput(html) {
  if (!html || html.trim() === '') return;
  const div = document.createElement('div');
  div.innerHTML = html;
  termOutput.appendChild(div);
  termOutput.parentElement.scrollTop = termOutput.parentElement.scrollHeight;
}

/* ── 커맨드 전송 ─────────────────────────────────────────────────────── */
document.getElementById('cmd-form').addEventListener('submit', async e => {
  e.preventDefault();
  const cmd = cmdInput.value.trim();
  cmdInput.value = '';
  if (lastStatus !== 'playing') return;

  // 에코
  appendOutput(`<pre class="term-out echo">&gt; ${escHtml(cmd)}</pre>`);

  try {
    const form = new FormData();
    form.append('cmd', cmd);
    await fetch(`/api/game/${SID}/command`, { method: 'POST', body: form });
  } catch(e) {}
});

/* ── 상태 업데이트 ───────────────────────────────────────────────────── */
function updateStatus(s) {
  const map = { playing: 'ONLINE', ended: 'SESSION ENDED', lobby: 'LOBBY' };
  statusTxt.textContent = map[s] || s.toUpperCase();
  if (s === 'ended') {
    appendOutput('<pre class="term-out dim">[ SESSION TERMINATED — <a href="/" style="color:#00FFFF">return to lobby</a> ]</pre>');
    document.getElementById('cmd-row').style.opacity = '0.3';
    document.getElementById('cmd-row').style.pointerEvents = 'none';
  }
}

/* ── 종료 ────────────────────────────────────────────────────────────── */
async function quitGame() {
  if (!confirm('런을 포기하고 로비로 돌아갑니까?')) return false;
  if (evtSource) { evtSource.close(); evtSource = null; }
  await fetch(`/api/game/${SID}/quit`, { method: 'POST' });
  window.location.href = '/';
  return false;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ── 시작 ────────────────────────────────────────────────────────────── */
cmdInput.focus();
connectStream();
</script>
{% endblock %}
