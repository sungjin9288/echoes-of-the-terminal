<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Echoes of the Terminal — itch.io Banner</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #050810;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100vw; height: 100vh;
    font-family: 'Courier New', 'Lucida Console', monospace;
  }

  /* ── Banner canvas 630×500 ── */
  .banner {
    width: 630px;
    height: 500px;
    background: #0A0E14;
    position: relative;
    overflow: hidden;
    border: 1px solid #2A3F5A;
  }

  /* scanline */
  .banner::before {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent, transparent 3px,
      rgba(0, 0, 0, 0.18) 3px, rgba(0, 0, 0, 0.18) 4px
    );
    z-index: 2;
    pointer-events: none;
  }

  /* vignette */
  .banner::after {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.65) 100%);
    z-index: 3;
    pointer-events: none;
  }

  /* ── Background grid ── */
  .bg-grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(57,255,20,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(57,255,20,0.05) 1px, transparent 1px);
    background-size: 40px 40px;
    z-index: 0;
  }

  /* ── Content ── */
  .content {
    position: relative;
    z-index: 4;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    padding: 40px;
    text-align: center;
  }

  /* status bar */
  .status-bar {
    font-size: 10px;
    color: #39FF14;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 32px;
    opacity: 0.8;
    display: flex;
    gap: 24px;
    align-items: center;
  }
  .status-bar .dot {
    display: inline-block;
    width: 6px; height: 6px;
    background: #39FF14;
    border-radius: 50%;
    box-shadow: 0 0 6px #39FF14;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

  /* eyebrow */
  .eyebrow {
    font-size: 13px;
    color: #6B7A8D;
    letter-spacing: 8px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  /* main title */
  .main-title {
    font-size: 80px;
    font-weight: 700;
    color: #39FF14;
    letter-spacing: -2px;
    line-height: 0.95;
    text-shadow:
      0 0 10px #39FF14,
      0 0 40px #39FF1444,
      0 0 80px #39FF1422;
    position: relative;
    margin-bottom: 16px;
  }

  /* glitch layers on title */
  .main-title::before {
    content: 'TERMINAL';
    position: absolute;
    top: 0; left: -3px;
    color: #FF073A;
    opacity: 0.5;
    clip-path: polygon(0 15%, 100% 15%, 100% 28%, 0 28%);
    animation: gt-r 5s step-end infinite;
  }
  .main-title::after {
    content: 'TERMINAL';
    position: absolute;
    top: 0; left: 3px;
    color: #00FFFF;
    opacity: 0.45;
    clip-path: polygon(0 60%, 100% 60%, 100% 72%, 0 72%);
    animation: gt-c 5s step-end infinite;
  }
  @keyframes gt-r {
    0%, 88%, 100% { clip-path: polygon(0 15%, 100% 15%, 100% 28%, 0 28%); left: -3px; opacity: 0.5; }
    90% { clip-path: polygon(0 8%, 100% 8%, 100% 20%, 0 20%); left: -5px; opacity: 0.7; }
    93% { clip-path: polygon(0 35%, 100% 35%, 100% 48%, 0 48%); left: -2px; opacity: 0.3; }
  }
  @keyframes gt-c {
    0%, 88%, 100% { clip-path: polygon(0 60%, 100% 60%, 100% 72%, 0 72%); left: 3px; opacity: 0.45; }
    91% { clip-path: polygon(0 70%, 100% 70%, 100% 82%, 0 82%); left: 5px; opacity: 0.6; }
    94% { clip-path: polygon(0 50%, 100% 50%, 100% 60%, 0 60%); left: 1px; opacity: 0.3; }
  }

  .cursor-blink {
    display: inline-block;
    width: 14px; height: 64px;
    background: #39FF14;
    margin-left: 4px;
    vertical-align: top;
    box-shadow: 0 0 12px #39FF14;
    animation: blink 1s step-end infinite;
  }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

  /* subtitle */
  .subtitle {
    font-size: 14px;
    color: #00FFFF;
    letter-spacing: 10px;
    text-transform: uppercase;
    margin-bottom: 36px;
    opacity: 0.85;
  }

  /* divider */
  .divider {
    width: 320px;
    height: 1px;
    background: linear-gradient(90deg, transparent, #2A3F5A, #39FF1444, #2A3F5A, transparent);
    margin-bottom: 28px;
  }

  /* feature tags */
  .tags {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 32px;
  }
  .tag {
    font-size: 10px;
    color: #6B7A8D;
    letter-spacing: 2px;
    text-transform: uppercase;
    border: 1px solid #1A2332;
    padding: 4px 10px;
  }
  .tag.hi {
    color: #FFD700;
    border-color: #FFD70033;
  }

  /* terminal prompt line */
  .prompt {
    font-size: 12px;
    color: #39FF14;
    letter-spacing: 1px;
    opacity: 0.6;
  }
  .prompt .cmd { color: #00FFFF; }

  /* corner decorations */
  .corner {
    position: absolute;
    width: 20px; height: 20px;
    border-color: #2A3F5A;
    border-style: solid;
    z-index: 5;
  }
  .corner.tl { top: 12px; left: 12px; border-width: 1px 0 0 1px; }
  .corner.tr { top: 12px; right: 12px; border-width: 1px 1px 0 0; }
  .corner.bl { bottom: 12px; left: 12px; border-width: 0 0 1px 1px; }
  .corner.br { bottom: 12px; right: 12px; border-width: 0 1px 1px 0; }

  /* trace meter */
  .trace-bar {
    position: absolute;
    bottom: 32px; left: 50%; transform: translateX(-50%);
    z-index: 5;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 10px;
    color: #6B7A8D;
    letter-spacing: 2px;
  }
  .trace-fill {
    width: 180px;
    height: 4px;
    background: #1A2332;
    position: relative;
    overflow: hidden;
  }
  .trace-fill::after {
    content: '';
    position: absolute;
    left: 0; top: 0;
    width: 35%;
    height: 100%;
    background: linear-gradient(90deg, #39FF14, #39FF1488);
    box-shadow: 0 0 6px #39FF14;
  }
</style>
</head>
<body>
  <div class="banner">
    <div class="bg-grid"></div>

    <!-- Corner decorations -->
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>

    <div class="content">
      <div class="status-bar">
        <span class="dot"></span>
        <span>TRACE LEVEL: 35%</span>
        <span>NODE: 3/7</span>
        <span>CRACKER CLASS</span>
      </div>

      <div class="eyebrow">Echoes of the</div>
      <div class="main-title">
        TERMINAL<span class="cursor-blink"></span>
      </div>
      <div class="subtitle">Text Log Roguelike</div>

      <div class="divider"></div>

      <div class="tags">
        <span class="tag hi">Roguelike</span>
        <span class="tag">터미널 기반</span>
        <span class="tag hi">텍스트 추리</span>
        <span class="tag">290 시나리오</span>
        <span class="tag hi">Ascension 20</span>
      </div>

      <div class="prompt">
        &gt; <span class="cmd">analyze</span> [keyword]&nbsp;<span style="animation: blink 1s step-end infinite; display:inline-block; width:8px; height:12px; background:#39FF14; vertical-align:middle;"></span>
      </div>
    </div>
  </div>
</body>
</html>
