name: Release Build

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: echoes-linux
            exe_name: EchoesOfTheTerminal
          - os: windows-latest
            artifact_name: echoes-windows
            exe_name: EchoesOfTheTerminal.exe
          - os: macos-latest
            artifact_name: echoes-macos
            exe_name: EchoesOfTheTerminal

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller echoes.spec

      - name: Rename artifact for platform
        shell: bash
        run: |
          src="dist/${{ matrix.exe_name }}"
          dst="dist/${{ matrix.artifact_name }}"
          [ "${{ matrix.os }}" = "windows-latest" ] && dst="${dst}.exe"
          mv "$src" "$dst" 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts

      - name: Upload binaries to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist-artifacts/**/*
          update_existing_release: true
